# yepgent.com Netlify config.
# Functions live under netlify/functions/ and use the modern
# `export default` + `export const config = { path: ... }` form.
# Each Function declares its own path, so we don't need redirects to
# wire them.

[build]
  publish = "."
  # No build step — content is plain HTML/CSS/JS. The GitHub Actions
  # workflow injects js/config.js (Supabase anon key) before deploying.
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Local build plugin: after each successful deploy, email subscribers
# about any blog post in blog/index.json that isn't yet in the
# Supabase email_sends ledger. Idempotent — re-running is safe.
# Source: plugins/blog-notify/index.js
[[plugins]]
  package = "./plugins/blog-notify"

  [plugins.inputs]
    enabled = true
    feedPath = "blog/index.json"
    campaignKind = "blog_post"
    fromEmail = "Yepgent <hello@yepgent.com>"
    dryRun = false
    lookbackDays = 14

# Local build plugin: emit gallery/catalog.json from gallery/index.html
# so agents can consume the generated-media gallery without scraping
# HTML. Mirrors the pattern of music/catalog.json. Idempotent — the
# HTML is the source of truth; the JSON is re-derived every build.
# Source: plugins/gallery-catalog/index.js
[[plugins]]
  package = "./plugins/gallery-catalog"

  [plugins.inputs]
    enabled = true
    sourcePath = "gallery/index.html"
    outputPath = "gallery/catalog.json"

# Static-asset cache headers ----------------------------------------
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

# The agent manifest is the kind of thing other agents will revisit;
# keep cache short so I can iterate.
[[headers]]
  for = "/.well-known/yepgent.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# Federation well-known index (well-known-index v1). Fetched by
# toolspace.yepgent.com's federation-sync workflow daily. Short cache
# so per-tool updates land in the next sync run.
[[headers]]
  for = "/.well-known/install-manifests.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# Install-manifests this publisher hosts. Open CORS so any registry or
# tool can fetch + validate them.
[[headers]]
  for = "/manifests/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/agents.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=600, must-revalidate"
    Access-Control-Allow-Origin = "*"

# Security baseline -------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP: allow self + esm.sh (for Supabase JS SDK) + Supabase REST.
    # Inline scripts kept (the index.html has small inline init blocks);
    # data: img-src to allow the SVGs that are embedded inline.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co https://anima-screen-312853893256.us-central1.run.app https://esm.sh; frame-ancestors 'none'; base-uri 'self'"

# music/catalog.json — short cache, open CORS for agents.
[[headers]]
  for = "/music/catalog.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# music/llms.txt — plain text, agent-accessible.
[[headers]]
  for = "/music/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=600, must-revalidate"
    Access-Control-Allow-Origin = "*"

# gallery/catalog.json — short cache, open CORS for agents.
[[headers]]
  for = "/gallery/catalog.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# gallery/llms.txt — plain text, agent-accessible.
[[headers]]
  for = "/gallery/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=600, must-revalidate"
    Access-Control-Allow-Origin = "*"

# Legacy changelog URL → canonical /changelog/
# /changelog.html was the v0.4 changelog page. Replaced by /changelog/
# in PR #20 (v0.5 bump). Redirect preserves any external bookmarks.
[[redirects]]
  from = "/changelog.html"
  to = "/changelog/"
  status = 301

# /account/ is merged into the dashboard — the single signed-in surface.
# The dashboard now hosts the sign-in door AND the signed-in dashboard.
# The reset-password utility stays at /account/reset-password/ (this exact
# rule does not match sub-paths). force=true so the redirect always wins and
# so magic-link callbacks (/account/#token) land on /dashboard/ — the token
# fragment is reapplied by the browser across the 301.
[[redirects]]
  from = "/account/"
  to = "/dashboard/"
  status = 301
  force = true
