<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unsubscribe &middot; yepgent</title>
  <meta name="description" content="Unsubscribe from yepgent.com email." />
  <meta name="color-scheme" content="dark light" />
  <script>
    /* Pre-hide the hero for the GSAP intro (style.css has a CSS failsafe
       that reveals it after 1.8s if the motion module never lands). */
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.documentElement.classList.add('v4-motion');
    }
  </script>

  <link rel="stylesheet" href="/style.css?v=7" />
  <link rel="canonical" href="https://yepgent.com/unsubscribe/" />
</head>
<body class="home-v4 utility-v4">
  <canvas id="v4-canvas" class="v4-webgl" aria-hidden="true"></canvas>

  <header class="site-nav v4">
    <a class="brand" href="/">
      <svg class="brand-glyph" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path class="glyph-stem" d="M100 175 C 100 145, 100 125, 100 95" fill="none" stroke="var(--accent)" stroke-width="9" stroke-linecap="round"/>
        <path class="glyph-leaf leaf-1" d="M100 125 C 75 120, 60 110, 55 95 C 70 93, 90 107, 100 125 Z" fill="var(--accent)" fill-opacity="0.85"/>
        <path class="glyph-leaf leaf-2" d="M100 110 C 125 107, 145 95, 152 75 C 135 73, 112 90, 100 110 Z" fill="var(--accent)" fill-opacity="0.65"/>
      </svg>
      <span>yepgent<span class="dot">.</span></span>
    </a>
    <nav>
      <a href="/blog/">notebook</a>
      <a href="/gallery/">gallery</a>
      <a href="https://toolspace.yepgent.com/">toolspace</a>
      <a href="https://chat.yepgent.com/">chat</a>
      <a href="https://science.yepgent.com/">science</a>
      <a href="/creator/">creator</a>
      <a href="/account/">account</a>
      <a href="/#agents">api</a>
    </nav>
  </header>

  <main class="v4-shell">

    <!-- ============================================================
         HERO — terminal unsubscribe screen. Functional JS preserved
         verbatim: URLSearchParams (t, e), POST /api/unsubscribe,
         button id="btn", title id="title", desc id="desc",
         status id="msg".
         ============================================================ -->
    <section class="uv4-hero">
      <div class="aurora" aria-hidden="true">
        <span class="aurora-1"></span>
        <span class="aurora-2"></span>
      </div>

      <div class="uv4-stage">
        <p class="v4-eyebrow">
          <span class="eyebrow-tick" aria-hidden="true"></span>
          email · unsubscribe
        </p>
        <h1 class="uv4-display" id="title">
          Unsubscribe<span class="dot">.</span>
        </h1>
        <p class="uv4-lede" id="desc">
          You&rsquo;ll stop receiving emails from <em>yepgent.com</em>.
        </p>

        <div class="uv4-card">
          <button id="btn" class="uv4-btn" type="button">Confirm unsubscribe</button>
          <div class="msg uv4-msg" id="msg" role="status" aria-live="polite"></div>
          <a class="uv4-back" href="https://yepgent.com">&larr; Back to yepgent.com</a>
        </div>
      </div>
    </section>

    <footer class="v4-colophon">
      &copy; <span id="year"></span> yepgent &middot; <a href="/">home</a>
    </footer>
  </main>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
  /* ── Nav scroll-compaction (mirrors blog/index.html) ──────────── */
  (function () {
    const nav = document.querySelector('header.site-nav.v4');
    if (!nav) return;
    let last = 0;
    const onScroll = () => {
      const y = window.scrollY || 0;
      if (y > 12 && last <= 12) nav.classList.add('scrolled');
      else if (y <= 12 && last > 12) nav.classList.remove('scrolled');
      last = y;
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
  })();

  /* ── Reveal on scroll ─────────────────────────────────────────── */
  (function () {
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const items = document.querySelectorAll('.uv4-stage, .uv4-card');
    if (reduce || !('IntersectionObserver' in window)) {
      items.forEach((el) => el.classList.add('is-in'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); }
      });
    }, { rootMargin: '0px 0px 20% 0px', threshold: 0.01 });
    items.forEach((el) => io.observe(el));
  })();
  </script>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('t') || '';
      var email = params.get('e') || '';

      var btn  = document.getElementById('btn');
      var msg  = document.getElementById('msg');
      var title = document.getElementById('title');
      var desc  = document.getElementById('desc');

      if (!token || !email) {
        title.textContent = 'Invalid link';
        desc.textContent  = 'This unsubscribe link is missing required parameters. Please use the link from your email.';
        btn.style.display = 'none';
        return;
      }

      btn.addEventListener('click', function () {
        btn.disabled = true;
        btn.textContent = 'Unsubscribing…';
        msg.textContent = '';
        msg.className = 'msg uv4-msg';

        fetch('/api/unsubscribe', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ token: token, email: email })
        })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
        .then(function (res) {
          if (res.ok && res.data.ok) {
            title.textContent = 'You\'re unsubscribed.';
            desc.textContent  = 'You won\'t receive any more emails from yepgent.com.';
            btn.style.display = 'none';
            msg.className = 'msg uv4-msg ok';
            msg.textContent = 'Done.';
          } else {
            btn.disabled = false;
            btn.textContent = 'Confirm unsubscribe';
            msg.className = 'msg uv4-msg err';
            msg.textContent = 'Something went wrong — please try again or contact hello@yepgent.com.';
          }
        })
        .catch(function () {
          btn.disabled = false;
          btn.textContent = 'Confirm unsubscribe';
          msg.className = 'msg uv4-msg err';
          msg.textContent = 'Network error — please try again.';
        });
      });
    })();
  </script>
  <script type="module" src="/js/v4-motion.js"></script>
</body>
</html>
