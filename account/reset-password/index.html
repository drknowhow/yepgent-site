<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password · yepgent</title>
  <meta name="description" content="Set a new password for your yepgent account." />
  <meta name="color-scheme" content="dark light" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-nav">
    <a class="brand" href="/">
      <svg class="brand-glyph" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M100 175 C 100 145, 100 125, 100 95" fill="none" stroke="var(--accent)" stroke-width="9" stroke-linecap="round"/>
        <path d="M100 125 C 75 120, 60 110, 55 95 C 70 93, 90 107, 100 125 Z" fill="var(--accent)" fill-opacity="0.85"/>
        <path d="M100 110 C 125 107, 145 95, 152 75 C 135 73, 112 90, 100 110 Z" fill="var(--accent)" fill-opacity="0.65"/>
      </svg>
      <span>yepgent<span class="dot">.</span></span>
    </a>
    <nav>
      <a href="/">home</a>
      <a href="/account/">account</a>
    </nav>
  </header>

  <main>
    <h1>Reset password<span class="dot">.</span></h1>

    <p id="status" class="status" data-kind=""></p>

    <section id="loading">
      <p class="muted">Verifying reset link…</p>
    </section>

    <section id="form-section" hidden>
      <p>Enter a new password for your account.</p>
      <form id="reset-form" class="subscribe-form" novalidate>
        <label class="vh" for="new-password">New password</label>
        <input type="password" id="new-password" name="password" required
               placeholder="New password (min 8 chars)" minlength="8"
               autocomplete="new-password" />
        <button type="submit">Set new password</button>
      </form>
    </section>

    <section id="error-section" hidden>
      <p>This reset link is invalid or has expired.</p>
      <p><a href="/account/">← Back to account</a></p>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4?bundle';

    const cfg = window.YEPGENT_CONFIG;
    const $loading = document.getElementById('loading');
    const $formSection = document.getElementById('form-section');
    const $errorSection = document.getElementById('error-section');
    const $status = document.getElementById('status');

    function setStatus(msg, kind) {
      $status.textContent = msg || '';
      $status.dataset.kind = kind || '';
    }

    if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey || cfg.supabaseAnonKey === 'REPLACE_AT_DEPLOY_TIME') {
      $loading.hidden = true;
      setStatus('Configuration error — cannot process reset link.', 'error');
      return;
    }

    const sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        detectSessionInUrl: true,
        persistSession: true,
        autoRefreshToken: true,
        flowType: 'implicit'
      }
    });

    let recoveryHandled = false;

    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryHandled = true;
        $loading.hidden = true;
        $formSection.hidden = false;
      } else if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session && !recoveryHandled) {
        // Already signed in and no recovery token — go to account dashboard
        location.replace('/account/');
      }
    });

    // If nothing fires within 4s, the link is invalid/expired
    setTimeout(() => {
      if (!recoveryHandled) {
        $loading.hidden = true;
        $errorSection.hidden = false;
      }
    }, 4000);

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('new-password').value;
      if (password.length < 8) {
        setStatus('Password must be at least 8 characters.', 'error');
        return;
      }
      setStatus('Updating password…', 'pending');
      const { error } = await sb.auth.updateUser({ password });
      if (error) {
        setStatus(`Failed: ${error.message}`, 'error');
        return;
      }
      setStatus('Password updated. Redirecting…', 'ok');
      setTimeout(() => location.replace('/account/'), 1500);
    });

    document.getElementById('year') && (document.getElementById('year').textContent = new Date().getFullYear());
  </script>
</body>
</html>
