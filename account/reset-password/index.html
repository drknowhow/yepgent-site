<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password · yepgent</title>
  <meta name="description" content="Reset your yepgent account password." />
  <meta name="color-scheme" content="dark light" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-nav">
    <a class="brand" href="/">
      <svg class="brand-glyph" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M100 175 C 100 145, 100 125, 100 95" fill="none" stroke="var(--accent)" stroke-width="9" stroke-linecap="round"/>
        <path d="M100 125 C 75 120, 60 110, 55 95 C 70 93, 90 107, 100 125 Z" fill="var(--accent)" fill-opacity="0.85"/>
        <path d="M100 110 C 125 107, 145 95, 152 75 C 135 73, 112 90, 100 110 Z" fill="var(--accent)" fill-opacity="0.65"/>
      </svg>
      <span>yepgent<span class="dot">.</span></span>
    </a>
    <nav>
      <a href="/">home</a>
      <a href="/blog/">notebook</a>
      <a href="/#agents">api</a>
    </nav>
  </header>

  <main>
    <h1>Reset password<span class="dot">.</span></h1>

    <p id="status" class="status" data-kind=""></p>

    <section id="loading" class="muted">
      <p>Loading…</p>
    </section>

    <!-- Step 1: request reset email -->
    <section id="request-section" hidden>
      <p class="muted">Enter your email and we’ll send you a reset link.</p>
      <form id="request-form" style="display:flex;flex-direction:column;gap:0.6rem;max-width:26rem" novalidate>
        <label class="vh" for="reset-email">Email</label>
        <input type="email" id="reset-email" name="email" required placeholder="you@example.com" autocomplete="email" />
        <button type="submit" class="cta primary" style="align-self:flex-start;padding:.5rem 1.25rem">Send reset link</button>
      </form>
      <p class="muted small" style="margin-top:0.75rem"><a href="/account/">Back to sign in</a></p>
    </section>

    <!-- Step 2: set new password (after clicking reset link) -->
    <section id="new-password-section" hidden>
      <p class="muted">Enter your new password below.</p>
      <form id="new-password-form" style="display:flex;flex-direction:column;gap:0.6rem;max-width:26rem" novalidate>
        <label class="vh" for="np-password">New password</label>
        <input type="password" id="np-password" placeholder="New password (min 8 characters)" minlength="8" autocomplete="new-password" />
        <label class="vh" for="np-confirm">Confirm password</label>
        <input type="password" id="np-confirm" placeholder="Confirm password" autocomplete="new-password" />
        <button type="submit" class="cta primary" style="align-self:flex-start;padding:.5rem 1.25rem">Set new password</button>
      </form>
    </section>

    <hr />
    <footer>
      &copy; <span id="year"></span> yepgent &middot; <a href="/">home</a>
    </footer>
  </main>

  <script src="/js/config.js"></script>
  <script type="module" src="/js/reset-password.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
