name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NETLIFY_MUSIC_SITE_ID: ${{ secrets.NETLIFY_MUSIC_SITE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Functions runtime)
        run: npm ci || npm install

      - name: Generate js/config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build:config

      # Generate gallery/catalog.json into the deployed dir. The Netlify
      # build plugins in netlify.toml never run here — `netlify deploy
      # --dir .` ships a prebuilt directory and skips `netlify build` —
      # so the catalog must be produced explicitly as a CI step.
      - name: Generate gallery/catalog.json
        run: npm run build:catalog

      # Pinned to v17 — matches toolspace-site (working). `@latest` (v18+)
      # broke env-only auth and started returning
      # `Unauthorized: could not retrieve project` against valid tokens.
      - name: Install Netlify CLI
        run: npm install --global netlify-cli@17

      - name: Deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --dir . \
            --prod \
            --message "Deploy ${{ github.sha }} from ${{ github.ref_name }}"

      # music.yepgent.com — separate Netlify site, same repo, music/ subdir.
      # Requires: NETLIFY_MUSIC_SITE_ID secret set in GitHub repo settings.
      # Setup: create site at app.netlify.com → copy site ID → add secret.
      # DNS: add CNAME music → <music-site-name>.netlify.app at GoDaddy.
      - name: Deploy music.yepgent.com (production)
        if: ${{ env.NETLIFY_MUSIC_SITE_ID != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          # Copy shared stylesheet so the music site is self-contained.
          cp style.css music/style.css
          netlify deploy \
            --site "$NETLIFY_MUSIC_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --dir music \
            --prod \
            --message "music: deploy ${{ github.sha }} from ${{ github.ref_name }}"
